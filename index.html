<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AI Chat</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link
    href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --bg: #0c0c0f;
      --surface: #141418;
      --surface2: #1c1c22;
      --border: #2a2a32;
      --accent: #7fff6e;
      --accent2: #6ee8ff;
      --text: #e8e8f0;
      --text-muted: #6b6b80;
      --user-bubble: #1e2a1e;
      --ai-bubble: #191924;
      --radius: 18px;
      --font-display: 'Syne', sans-serif;
      --font-mono: 'DM Mono', monospace;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-mono);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ── */
    .app-header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 14px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .app-header .logo {
      font-family: var(--font-display);
      font-weight: 800;
      font-size: 1.1rem;
      letter-spacing: -0.02em;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo-dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 10px var(--accent);
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 1;
        transform: scale(1);
      }

      50% {
        opacity: 0.6;
        transform: scale(0.85);
      }
    }

    .model-pill {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text-muted);
      font-family: var(--font-mono);
      font-size: 0.72rem;
      padding: 5px 14px;
      border-radius: 100px;
      cursor: pointer;
      appearance: none;
      outline: none;
      transition: border-color 0.2s;
    }

    .model-pill:hover,
    .model-pill:focus {
      border-color: var(--accent);
      color: var(--text);
    }

    /* ── Layout ── */
    .layout {
      display: flex;
      flex: 1;
      overflow: hidden;
      height: calc(100vh - 57px);
    }

    /* ── Sidebar ── */
    .sidebar {
      width: 220px;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      padding: 20px 14px;
      gap: 12px;
      flex-shrink: 0;
    }

    .btn-new {
      background: var(--accent);
      color: #050f05;
      border: none;
      border-radius: 100px;
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 0.8rem;
      padding: 10px 16px;
      cursor: pointer;
      letter-spacing: 0.02em;
      transition: opacity 0.2s, transform 0.15s;
    }

    .btn-new:hover {
      opacity: 0.85;
      transform: translateY(-1px);
    }

    .chat-list {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .chat-item {
      background: transparent;
      border: 1px solid transparent;
      border-radius: 10px;
      color: var(--text-muted);
      font-family: var(--font-mono);
      font-size: 0.75rem;
      padding: 9px 13px;
      text-align: left;
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .chat-item:hover,
    .chat-item.active {
      background: var(--surface2);
      border-color: var(--border);
      color: var(--text);
    }

    /* ── Main ── */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Chat pane ── */
    .chat-pane {
      flex: 1;
      overflow-y: auto;
      padding: 32px 24px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      scroll-behavior: smooth;
    }

    .chat-pane::-webkit-scrollbar {
      width: 4px;
    }

    .chat-pane::-webkit-scrollbar-track {
      background: transparent;
    }

    .chat-pane::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 4px;
    }

    /* Welcome state */
    .welcome {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      text-align: center;
      animation: fadeUp 0.5s ease both;
    }

    .welcome-title {
      font-family: var(--font-display);
      font-size: 2rem;
      font-weight: 800;
      letter-spacing: -0.04em;
      line-height: 1;
    }

    .welcome-title span {
      color: var(--accent);
    }

    .welcome-sub {
      color: var(--text-muted);
      font-size: 0.82rem;
      max-width: 320px;
      line-height: 1.6;
    }

    .suggestion-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      margin-top: 8px;
    }

    .chip {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 100px;
      color: var(--text-muted);
      font-size: 0.72rem;
      font-family: var(--font-mono);
      padding: 7px 14px;
      cursor: pointer;
      transition: all 0.15s;
    }

    .chip:hover {
      border-color: var(--accent);
      color: var(--accent);
      background: rgba(127, 255, 110, 0.05);
    }

    /* Messages */
    .msg-row {
      display: flex;
      animation: fadeUp 0.3s ease both;
    }

    .msg-row.user {
      justify-content: flex-end;
    }

    .msg-row.ai {
      justify-content: flex-start;
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(12px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .bubble {
      max-width: 70%;
      padding: 13px 18px;
      border-radius: var(--radius);
      font-size: 0.85rem;
      line-height: 1.65;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .bubble.user {
      background: var(--user-bubble);
      border: 1px solid rgba(127, 255, 110, 0.15);
      border-bottom-right-radius: 5px;
      color: var(--text);
    }

    .bubble.ai {
      background: var(--ai-bubble);
      border: 1px solid var(--border);
      border-bottom-left-radius: 5px;
      color: var(--text);
    }

    /* AI avatar */
    .ai-avatar {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      flex-shrink: 0;
      margin-right: 10px;
      margin-top: 2px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      color: #050f05;
      font-weight: 700;
    }

    /* Typing indicator */
    .typing-dots {
      display: flex;
      gap: 5px;
      padding: 14px 18px;
      background: var(--ai-bubble);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      border-bottom-left-radius: 5px;
      width: fit-content;
    }

    .typing-dots span {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--text-muted);
      animation: blink 1.2s ease infinite;
    }

    .typing-dots span:nth-child(2) {
      animation-delay: 0.2s;
    }

    .typing-dots span:nth-child(3) {
      animation-delay: 0.4s;
    }

    @keyframes blink {

      0%,
      80%,
      100% {
        opacity: 0.2;
        transform: scale(0.85);
      }

      40% {
        opacity: 1;
        transform: scale(1);
      }
    }

    /* ── Input area ── */
    .input-area {
      padding: 16px 24px 20px;
      border-top: 1px solid var(--border);
      background: var(--bg);
    }

    .input-row {
      display: flex;
      gap: 10px;
      align-items: center;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 100px;
      padding: 6px 6px 6px 18px;
      transition: border-color 0.2s;
    }

    .input-row:focus-within {
      border-color: var(--accent);
    }

    .input-row input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text);
      font-family: var(--font-mono);
      font-size: 0.85rem;
    }

    .input-row input::placeholder {
      color: var(--text-muted);
    }

    .btn-send {
      background: var(--accent);
      border: none;
      border-radius: 100px;
      width: 38px;
      height: 38px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.15s;
      color: #050f05;
      font-size: 1rem;
      flex-shrink: 0;
    }

    .btn-send:hover:not(:disabled) {
      opacity: 0.85;
      transform: scale(1.05);
    }

    .btn-send:disabled {
      opacity: 0.3;
      cursor: not-allowed;
    }

    .input-hint {
      font-size: 0.68rem;
      color: var(--text-muted);
      text-align: center;
      margin-top: 10px;
      letter-spacing: 0.01em;
    }

    /* ── Mobile offcanvas ── */
    .offcanvas {
      background: var(--surface);
      color: var(--text);
    }

    .offcanvas-header {
      border-bottom: 1px solid var(--border);
    }

    .btn-close {
      filter: invert(1) brightness(0.6);
    }

    .offcanvas-title {
      font-family: var(--font-display);
      font-weight: 700;
    }

    .hamburger {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      padding: 6px 10px;
      font-size: 1rem;
      cursor: pointer;
      display: none;
    }

    @media (max-width: 767px) {
      .sidebar {
        display: none !important;
      }

      .hamburger {
        display: block;
      }

      .bubble {
        max-width: 88%;
      }
    }

    /* ── Footer ── */
    footer {
      background: var(--surface);
      border-top: 1px solid var(--border);
      padding: 14px;
      text-align: center;
      font-size: 0.7rem;
      color: var(--text-muted);
      font-family: var(--font-display);
      letter-spacing: 0.05em;
    }

    footer .social-icons {
      margin-top: 6px;
      display: flex;
      justify-content: center;
      gap: 16px;
    }

    footer .social-icons i {
      font-size: 1rem;
      cursor: pointer;
      transition: color 0.2s;
    }

    footer .social-icons i:hover {
      color: var(--accent);
    }
  </style>
</head>

<body>

  <!-- Header -->
  <header class="app-header">
    <div class="logo">
      <div class="logo-dot"></div>
      AI Chat
    </div>
    <div style="display:flex;align-items:center;gap:10px;">
      <button class="hamburger" data-bs-toggle="offcanvas" data-bs-target="#sidebarOffcanvas">
        <i class="bi bi-list"></i>
      </button>
      <select id="ModeSelected" class="model-pill">
        <option value="chat">chat</option>
        <option value="image">image</option>
      </select>
    </div>
  </header>

  <!-- Layout -->
  <div class="layout">

    <!-- Sidebar (desktop) -->
    <aside class="sidebar">
      <button class="btn-new" onclick="newChat()">+ New Chat</button>
      <div class="chat-list" id="chatList">
        <button class="chat-item active">Getting started</button>
      </div>
    </aside>

    <!-- Mobile offcanvas -->
    <div class="offcanvas offcanvas-start" tabindex="-1" id="sidebarOffcanvas">
      <div class="offcanvas-header">
        <h5 class="offcanvas-title">Chats</h5>
        <button type="button" class="btn-close" data-bs-dismiss="offcanvas"></button>
      </div>
      <div class="offcanvas-body" style="display:flex;flex-direction:column;gap:12px;">
        <button class="btn-new" onclick="newChat()">+ New Chat</button>
        <div class="chat-list" id="chatListMobile">
          <button class="chat-item active">Getting started</button>
        </div>
      </div>
    </div>

    <!-- Main -->
    <main class="main">
      <div class="chat-pane" id="chatPane">
        <!-- Welcome screen -->
        <div class="welcome" id="welcomeScreen">
          <div class="welcome-title">Hello,<br><span>how can I help?</span></div>
          <p class="welcome-sub">Ask me anything — I'm powered by AI and ready to think with you.</p>
          <div class="suggestion-chips">
            <button class="chip" onclick="useChip(this)">Explain quantum computing</button>
            <button class="chip" onclick="useChip(this)">Write a haiku about space</button>
            <button class="chip" onclick="useChip(this)">Summarize the news today</button>
            <button class="chip" onclick="useChip(this)">Help me debug my code</button>
          </div>
        </div>
      </div>

      <!-- Input -->
      <div class="input-area">
        <div class="input-row">
          <input id="prompt" type="text" placeholder="Ask me anything…" autocomplete="off" />
          <button class="btn-send" id="sendBtn" onclick="handleSend()">
            <i class="bi bi-arrow-up"></i>
          </button>
        </div>
        <div class="input-hint">Press Enter to send &nbsp;·&nbsp; AI can make mistakes</div>
      </div>
    </main>
  </div>

  <!-- Footer -->
  <footer>
    <div>AI Chat Demo</div>
    <div class="social-icons">
      <i class="bi bi-facebook"></i>
      <i class="bi bi-linkedin"></i>
      <i class="bi bi-youtube"></i>
      <i class="bi bi-instagram"></i>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="./Script.js"></script>
</body>

</html>
